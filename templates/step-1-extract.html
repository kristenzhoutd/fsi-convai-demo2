<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafafa}
.card{max-width:480px;margin:0 auto;background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);border-top:3px solid #c4a35a;padding:24px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.title{font-size:15px;font-weight:700;color:#0f1b61}
.step{font-size:10px;color:#999;font-weight:600;letter-spacing:1px}
.grid{display:grid;grid-template-columns:90px 1fr;row-gap:12px;font-size:13px}
.gl{color:#999;font-weight:500}
.gv{color:#1a1a1a}
.gv.em{color:#0f1b61;font-weight:600}
</style></head>
<body><div class="card">
  <div class="top">
    <span class="title">Conversational Intelligence</span>
    <span class="step">1 / 4</span>
  </div>
  <div class="grid">
    <span class="gl">Name</span>
    <span class="gv em">{{NAME}}</span>
    <span class="gl">Phone</span>
    <span class="gv">{{PHONE}}</span>
    <span class="gl">Account</span>
    <span class="gv">{{ACCOUNT}}</span>
    <span class="gl">Intent</span>
    <span class="gv em">{{INTENT}}</span>
    <span class="gl">Signals</span>
    <span class="gv">{{SIGNALS}}</span>
  </div>
</div></body></html>
